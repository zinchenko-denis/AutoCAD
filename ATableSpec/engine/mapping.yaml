# mapping_facade.yaml
# Конфиг для dxf_spec — схема блоков фасадного КМД (проект В32).
# Это аналог "шаблона СПДС": под другой набор блоков правится только здесь.

# 1. Какие слои несут элементы (остальные — рамка/логотип/служебное — игнор).
#    type — канонический тип элемента, появляется в ведомостях.
element_layers:
  RF-ригеля:     {type: ригель}
  RF-стойки:     {type: стойка}
  RF-кронштейны: {type: кронштейн}
  RF-заполнения: {type: заполнение}
  RF-створки:    {type: створка}
  _Ограждения:   {type: ограждение}

# 2. Проекция сырых тегов ATTRIB в канонические поля.
#    Для каждого поля — список тегов-кандидатов; берётся первый непустой.
#    Так разнотипные блоки (профиль vs заполнение) ложатся в одну модель.
field_map:
  mark:    [ИМЯ, МАРКИРОВКА, ОГРАЖДЕНИЕ]   # марка/маркировка/обозначение
  article: [ПРОФ, АРТИКУЛ]                  # артикул профиля
  length:  [ДЛИНА]                          # длина, мм (число)
  size:    [РАЗМЕР_ЗАП]                     # размер заполнения "Ш<sep>В"

# 3. Прочие атрибуты, которые тянем в сырьё и можем группировать
#    (торцовка профилей: угол/клин/добор, левый/правый).
keep_attrs: [ПРОФ, UGL, UGR, KLL, KLR, DOBL, DOBR, R, L]

# 4. Разделители в РАЗМЕР_ЗАП. ВАЖНО: первая — кириллическая 'Х' (U+0425),
#    как в исходном чертеже; латинская 'X' и '*' — на всякий случай.
size_separators: ["Х", "X", "х", "x", "*"]

# 5. Ведомости/спецификации. Каждая: какие типы включить, по каким полям
#    группировать, какие меры считать (count / sum_length), как сортировать.
reports:
  - name: профили
    title: "Ведомость профилей (распил)"
    include_types: [ригель, стойка]
    group_by: [type, article, mark, length, UGL, UGR, KLL, KLR, DOBL, DOBR]
    measures:
      кол_во: count
      длина_сумм_мм: sum_length
    sort_by: [type, article, mark, length]

  - name: кронштейны
    title: "Ведомость кронштейнов"
    include_types: [кронштейн]
    group_by: [type, mark]
    measures: {кол_во: count}
    sort_by: [mark]

  - name: заполнения
    title: "Спецификация заполнений"
    include_types: [заполнение]
    group_by: [type, mark, width, height]
    measures: {кол_во: count}
    sort_by: [mark, width, height]

  - name: створки
    title: "Ведомость створок"
    include_types: [створка]
    group_by: [type, mark]
    measures: {кол_во: count}
    sort_by: [mark]

  - name: ограждения
    title: "Ведомость ограждений"
    include_types: [ограждение]
    group_by: [type, mark]
    measures: {кол_во: count}
    sort_by: [mark]
